<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Lim.Calculators</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#b7d6b8,#94c2a4);
}

.calculator{
    background:#f0f0f0;
    padding:35px;
    border-radius:30px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    color:#3b7a5b;
    margin-bottom:20px;
    font-size:28px;
}

#display{
    width:100%;
    height:60px;
    border:none;
    border-radius:15px;
    margin-bottom:20px;
    font-size:28px;
    padding:10px;
    text-align:right;
    background:#dfeae3;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,70px);
    gap:15px;
}

button{
    height:60px;
    border:none;
    border-radius:15px;
    font-size:20px;
    cursor:pointer;
}

.number{
    background:#d6e2d8;
}

.operator{
    background:#74c69d;
    color:white;
}

.equal{
    background:#40916c;
    color:white;
}

.clear{
    background:#f28482;
    color:white;
}

button:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="calculator">

<h2>Lim.Calculators 🧮✨</h2>

<input type="text" id="display" disabled>

<div class="buttons">

<button class="number" onclick="add('1')">1</button>
<button class="number" onclick="add('2')">2</button>
<button class="number" onclick="add('3')">3</button>
<button class="operator" onclick="add('+')">+</button>

<button class="number" onclick="add('4')">4</button>
<button class="number" onclick="add('5')">5</button>
<button class="number" onclick="add('6')">6</button>
<button class="operator" onclick="add('-')">-</button>

<button class="number" onclick="add('7')">7</button>
<button class="number" onclick="add('8')">8</button>
<button class="number" onclick="add('9')">9</button>
<button class="operator" onclick="add('*')">*</button>

<button class="clear" onclick="clearDisplay()">C</button>
<button class="number" onclick="add('0')">0</button>
<button class="equal" onclick="calculate()">=</button>
<button class="operator" onclick="add('/')">/</button>

</div>

</div>

<script>

function add(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value="";
}

function calculate(){
    let result = document.getElementById("display").value;
    document.getElementById("display").value = eval(result);
}

</script>

</body>
</html>
